# GitLab CI/CD Pipeline for Semio Security Integration Demo
# This pipeline demonstrates automated security scanning and fix recommendations

stages:
  - security-scan
  - semio-analysis
  - create-fixes

variables:
  SEMIO_API_URL: "http://localhost:8000"  # Change to your Semio API URL
  SEMIO_API_KEY: "$SEMIO_API_KEY"  # Set this in GitLab CI/CD variables

# Security scanning with Semgrep
security-scan:
  stage: security-scan
  image: returntocorp/semgrep:latest
  script:
    - echo "Running Semgrep security scan..."
    - semgrep ci --json --output semgrep-results.json
    - echo "Semgrep scan completed. Found vulnerabilities:"
    - jq '.results | length' semgrep-results.json || echo "0"
  artifacts:
    paths:
      - semgrep-results.json
    expire_in: 1 hour
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

# Send results to Semio for analysis
semio-analysis:
  stage: semio-analysis
  image: python:3.11-slim
  before_script:
    - pip install requests
  script:
    - echo "Sending Semgrep results to Semio for analysis..."
    - |
      if [ -f semgrep-results.json ]; then
        curl -X POST "$SEMIO_API_URL/api/review" \
          -H "X-API-Key: $SEMIO_API_KEY" \
          -F "file=@semgrep-results.json" \
          -o semio-analysis.json
        echo "Semio analysis completed"
        echo "Vulnerabilities found:"
        jq '.total_vulnerabilities' semio-analysis.json || echo "0"
        echo "High confidence fixes:"
        jq '.high_confidence_fixes' semio-analysis.json || echo "0"
      else
        echo "No Semgrep results found"
        echo '{"total_vulnerabilities": 0, "high_confidence_fixes": 0}' > semio-analysis.json
      fi
  artifacts:
    paths:
      - semio-analysis.json
    expire_in: 1 hour
  dependencies:
    - security-scan
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

# Create fixes branch and MR (if vulnerabilities found)
create-fixes:
  stage: create-fixes
  image: alpine:latest
  before_script:
    - apk add --no-cache git curl jq
    - git config --global user.email "semio-bot@example.com"
    - git config --global user.name "Semio Security Bot"
  script:
    - |
      VULN_COUNT=$(jq -r '.total_vulnerabilities' semio-analysis.json)
      if [ "$VULN_COUNT" -gt 0 ]; then
        echo "Found $VULN_COUNT vulnerabilities. Creating fixes branch..."
        
        # Create new branch for fixes
        FIXES_BRANCH="security-fixes-$(date +%Y%m%d-%H%M%S)"
        git checkout -b "$FIXES_BRANCH"
        
        # Apply fixes (this would be implemented based on Semio's fix format)
        echo "Applying security fixes..."
        # TODO: Parse semio-analysis.json and apply fixes to files
        
        # Commit fixes
        git add .
        git commit -m "🔒 Apply security fixes from Semio analysis
        
        - Fixed $VULN_COUNT vulnerabilities
        - High confidence fixes: $(jq -r '.high_confidence_fixes' semio-analysis.json)
        - Generated by Semio Security Bot"
        
        # Push fixes branch
        git push origin "$FIXES_BRANCH"
        
        # Create Merge Request
        echo "Creating Merge Request..."
        curl -X POST "$CI_API_V4_URL/projects/$CI_PROJECT_ID/merge_requests" \
          -H "PRIVATE-TOKEN: $GITLAB_TOKEN" \
          -H "Content-Type: application/json" \
          -d "{
            \"source_branch\": \"$FIXES_BRANCH\",
            \"target_branch\": \"$CI_COMMIT_REF_NAME\",
            \"title\": \"🔒 Security Fixes - Semio Analysis\",
            \"description\": \"## Security Fixes Applied\n\nThis MR contains automated security fixes generated by Semio:\n\n- **Vulnerabilities Found**: $VULN_COUNT\n- **High Confidence Fixes**: $(jq -r '.high_confidence_fixes' semio-analysis.json)\n- **Analysis Date**: $(date)\n\n### Review Required\n\nPlease review these automated fixes before merging. Some fixes may require manual verification.\n\n### Files Modified\n\n$(git diff --name-only HEAD~1)\",
            \"remove_source_branch\": true,
            \"squash\": false
          }"
        
        echo "✅ Security fixes branch created: $FIXES_BRANCH"
        echo "✅ Merge Request created for review"
      else
        echo "✅ No vulnerabilities found. No fixes needed."
      fi
  dependencies:
    - semio-analysis
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
  only:
    - merge_requests
    - main
    - master

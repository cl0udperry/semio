# DevSecOps Pipeline with Semio Integration
# This pipeline demonstrates automated security scanning and AI-powered fix recommendations

stages:
  - build
  - security-scan
  - semio-analysis
  - create-fixes
  - deploy

variables:
  SEMIO_API_URL: "http://localhost:8000"  # Change to your Semio API URL
  SEMIO_API_KEY: "$SEMIO_API_KEY"  # Set this in GitLab CI/CD variables
  DOCKER_IMAGE: "semio-demo-app"

# Build stage
build:
  stage: build
  image: docker:latest
  services:
    - docker:dind
  before_script:
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
  script:
    - echo "Building Docker image..."
    - docker build -t $CI_REGISTRY_IMAGE:$CI_COMMIT_SHA .
    - docker push $CI_REGISTRY_IMAGE:$CI_COMMIT_SHA
    - echo "✅ Docker image built and pushed"
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

# Security scanning with Semgrep
security-scan:
  stage: security-scan
  image: returntocorp/semgrep:latest
  script:
    - echo "🔍 Running Semgrep security scan..."
    - semgrep ci --json --output semgrep-results.json --config auto
    - echo "📊 Semgrep scan completed. Found vulnerabilities:"
    - jq '.results | length' semgrep-results.json || echo "0"
    - echo "📋 Vulnerability summary:"
    - jq -r '.results[] | "\(.check_id) - \(.extra.severity) - \(.path):\(.start.line)"' semgrep-results.json || echo "No vulnerabilities found"
  artifacts:
    paths:
      - semgrep-results.json
    reports:
      semgrep: semgrep-results.json
    expire_in: 1 hour
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

# Send results to Semio for AI analysis
semio-analysis:
  stage: semio-analysis
  image: python:3.11-slim
  before_script:
    - pip install requests
  script:
    - echo "🤖 Sending Semgrep results to Semio for AI analysis..."
    - |
      if [ -f semgrep-results.json ]; then
        echo "📤 Uploading scan results to Semio API..."
        curl -X POST "$SEMIO_API_URL/api/review-public" \
          -H "Content-Type: application/json" \
          -d @semgrep-results.json \
          -o semio-analysis.json
        
        echo "✅ Semio analysis completed"
        echo "📊 Analysis results:"
        echo "  - Total vulnerabilities: $(jq -r '.total_vulnerabilities' semio-analysis.json)"
        echo "  - High confidence fixes: $(jq -r '.high_confidence_fixes' semio-analysis.json)"
        echo "  - Medium confidence fixes: $(jq -r '.medium_confidence_fixes' semio-analysis.json)"
        echo "  - Low confidence fixes: $(jq -r '.low_confidence_fixes' semio-analysis.json)"
        
        # Generate summary report
        echo "📄 Generating security report..."
        jq -r '.summary | "## Security Analysis Summary\n\n- **Total Vulnerabilities**: \(.total_vulnerabilities)\n- **High Confidence Fixes**: \(.high_confidence_fixes)\n- **Medium Confidence Fixes**: \(.medium_confidence_fixes)\n- **Low Confidence Fixes**: \(.low_confidence_fixes)\n- **Errors**: \(.errors_count)"' semio-analysis.json > security-report.md
        
      else
        echo "⚠️ No Semgrep results found"
        echo '{"total_vulnerabilities": 0, "high_confidence_fixes": 0}' > semio-analysis.json
        echo "## Security Analysis Summary\n\n✅ No vulnerabilities found!" > security-report.md
      fi
  artifacts:
    paths:
      - semio-analysis.json
      - security-report.md
    expire_in: 1 hour
  dependencies:
    - security-scan
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

# Create fixes branch and MR (if vulnerabilities found)
create-fixes:
  stage: create-fixes
  image: alpine:latest
  before_script:
    - apk add --no-cache git curl jq
    - git config --global user.email "semio-bot@example.com"
    - git config --global user.name "Semio Security Bot"
  script:
    - |
      VULN_COUNT=$(jq -r '.total_vulnerabilities' semio-analysis.json)
      HIGH_CONFIDENCE=$(jq -r '.high_confidence_fixes' semio-analysis.json)
      
      if [ "$VULN_COUNT" -gt 0 ]; then
        echo "🚨 Found $VULN_COUNT vulnerabilities. Creating automated fixes..."
        
        # Create new branch for fixes
        FIXES_BRANCH="security-fixes-$(date +%Y%m%d-%H%M%S)"
        git checkout -b "$FIXES_BRANCH"
        
        # Apply fixes based on Semio analysis
        echo "🔧 Applying security fixes..."
        
        # Read the analysis and apply fixes
        FIXES=$(jq -r '.fixes[] | "\(.file_path):\(.start_line):\(.suggested_fix)"' semio-analysis.json 2>/dev/null || echo "")
        
        if [ -n "$FIXES" ]; then
          echo "$FIXES" | while IFS=':' read -r file_path start_line suggested_fix; do
            if [ -n "$file_path" ] && [ -f "$file_path" ]; then
              echo "  - Fixing $file_path at line $start_line"
              # Here you would apply the actual fix
              # For demo purposes, we'll just create a backup
              cp "$file_path" "${file_path}.backup"
            fi
          done
        fi
        
        # Create a summary file
        cat > SECURITY_FIXES.md << EOF
# 🔒 Security Fixes Applied

This branch contains automated security fixes generated by Semio AI analysis.

## Summary
- **Vulnerabilities Found**: $VULN_COUNT
- **High Confidence Fixes**: $HIGH_CONFIDENCE
- **Analysis Date**: $(date)
- **Generated by**: Semio Security Bot

## Files Modified
$(git diff --name-only HEAD~1 2>/dev/null || echo "No files modified yet")

## Review Required
Please review these automated fixes before merging. Some fixes may require manual verification.

## Original Analysis
$(cat security-report.md)
EOF
        
        # Commit fixes
        git add .
        git commit -m "🔒 Apply security fixes from Semio AI analysis

- Fixed $VULN_COUNT vulnerabilities
- High confidence fixes: $HIGH_CONFIDENCE
- Generated by Semio Security Bot
- Analysis ID: $(jq -r '.upload_id' semio-analysis.json)"

        # Push fixes branch
        git push origin "$FIXES_BRANCH"
        
        # Create Merge Request
        echo "📝 Creating Merge Request..."
        MR_RESPONSE=$(curl -X POST "$CI_API_V4_URL/projects/$CI_PROJECT_ID/merge_requests" \
          -H "PRIVATE-TOKEN: $GITLAB_TOKEN" \
          -H "Content-Type: application/json" \
          -d "{
            \"source_branch\": \"$FIXES_BRANCH\",
            \"target_branch\": \"$CI_COMMIT_REF_NAME\",
            \"title\": \"🔒 Security Fixes - Semio AI Analysis\",
            \"description\": \"$(cat SECURITY_FIXES.md | sed 's/"/\\"/g' | tr '\n' ' ')\",
            \"remove_source_branch\": true,
            \"squash\": false
          }" 2>/dev/null)
        
        if [ $? -eq 0 ]; then
          echo "✅ Security fixes branch created: $FIXES_BRANCH"
          echo "✅ Merge Request created for review"
        else
          echo "⚠️ Failed to create Merge Request (this is normal for demo)"
          echo "✅ Security fixes branch created: $FIXES_BRANCH"
        fi
        
      else
        echo "✅ No vulnerabilities found. No fixes needed."
        echo "🎉 Your code is secure!"
      fi
  dependencies:
    - semio-analysis
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
  only:
    - merge_requests
    - main
    - master

# Deploy stage (for demo purposes)
deploy:
  stage: deploy
  image: alpine:latest
  before_script:
    - apk add --no-cache curl
  script:
    - echo "🚀 Deploying application..."
    - echo "📦 Docker image: $CI_REGISTRY_IMAGE:$CI_COMMIT_SHA"
    - echo "🌐 Application would be deployed here"
    - echo "✅ Deployment completed successfully"
  dependencies:
    - build
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
  environment:
    name: production
    url: https://semio-demo.example.com

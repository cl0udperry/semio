# GitHub Actions Workflow for Semio Security Integration Demo
# This workflow demonstrates automated security scanning and fix recommendations

name: Semio Security Analysis

on:
  pull_request:
    branches: [ main, master ]
  push:
    branches: [ main, master ]

env:
  SEMIO_API_URL: http://localhost:8000  # Change to your Semio API URL
  SEMIO_API_KEY: ${{ secrets.SEMIO_API_KEY }}

jobs:
  security-scan:
    name: Security Scan with Semgrep
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Semgrep
        uses: returntocorp/semgrep-action@v1
        with:
          config: >-
            p/security-audit
            p/secrets
            p/owasp-top-ten
          output-format: json
          output-file: semgrep-results.json
          sarif: false

      - name: Display Semgrep results
        run: |
          echo "Semgrep scan completed"
          if [ -f semgrep-results.json ]; then
            VULN_COUNT=$(jq '.results | length' semgrep-results.json)
            echo "Found $VULN_COUNT vulnerabilities"
          else
            echo "No vulnerabilities found"
          fi

      - name: Upload Semgrep results
        uses: actions/upload-artifact@v4
        with:
          name: semgrep-results
          path: semgrep-results.json
          retention-days: 1

  semio-analysis:
    name: Semio Analysis
    runs-on: ubuntu-latest
    needs: security-scan
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download Semgrep results
        uses: actions/download-artifact@v4
        with:
          name: semgrep-results
          path: .

      - name: Send to Semio for analysis
        run: |
          echo "Sending Semgrep results to Semio for analysis..."
          if [ -f semgrep-results.json ]; then
            curl -X POST "$SEMIO_API_URL/api/review" \
              -H "X-API-Key: $SEMIO_API_KEY" \
              -F "file=@semgrep-results.json" \
              -o semio-analysis.json
            
            echo "Semio analysis completed"
            VULN_COUNT=$(jq -r '.total_vulnerabilities' semio-analysis.json)
            HIGH_CONFIDENCE=$(jq -r '.high_confidence_fixes' semio-analysis.json)
            echo "Vulnerabilities found: $VULN_COUNT"
            echo "High confidence fixes: $HIGH_CONFIDENCE"
          else
            echo "No Semgrep results found"
            echo '{"total_vulnerabilities": 0, "high_confidence_fixes": 0}' > semio-analysis.json
          fi

      - name: Upload Semio analysis
        uses: actions/upload-artifact@v4
        with:
          name: semio-analysis
          path: semio-analysis.json
          retention-days: 1

  create-fixes:
    name: Create Security Fixes PR
    runs-on: ubuntu-latest
    needs: semio-analysis
    if: github.event_name == 'pull_request'
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Download Semio analysis
        uses: actions/download-artifact@v4
        with:
          name: semio-analysis
          path: .

      - name: Check for vulnerabilities
        id: check-vulns
        run: |
          VULN_COUNT=$(jq -r '.total_vulnerabilities' semio-analysis.json)
          echo "vuln_count=$VULN_COUNT" >> $GITHUB_OUTPUT
          if [ "$VULN_COUNT" -gt 0 ]; then
            echo "has_vulnerabilities=true" >> $GITHUB_OUTPUT
          else
            echo "has_vulnerabilities=false" >> $GITHUB_OUTPUT
          fi

      - name: Create fixes branch
        if: steps.check-vulns.outputs.has_vulnerabilities == 'true'
        run: |
          echo "Found ${{ steps.check-vulns.outputs.vuln_count }} vulnerabilities. Creating fixes branch..."
          
          # Configure git
          git config --global user.email "semio-bot@github.actions"
          git config --global user.name "Semio Security Bot"
          
          # Create new branch
          FIXES_BRANCH="security-fixes-$(date +%Y%m%d-%H%M%S)"
          git checkout -b "$FIXES_BRANCH"
          
          # Apply fixes (this would be implemented based on Semio's fix format)
          echo "Applying security fixes..."
          # TODO: Parse semio-analysis.json and apply fixes to files
          
          # Commit fixes
          git add .
          git commit -m "🔒 Apply security fixes from Semio analysis

          - Fixed ${{ steps.check-vulns.outputs.vuln_count }} vulnerabilities
          - High confidence fixes: $(jq -r '.high_confidence_fixes' semio-analysis.json)
          - Generated by Semio Security Bot"
          
          # Push fixes branch
          git push origin "$FIXES_BRANCH"

      - name: Create Pull Request
        if: steps.check-vulns.outputs.has_vulnerabilities == 'true'
        uses: peter-evans/create-pull-request@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: security-fixes-$(date +%Y%m%d-%H%M%S)
          base: ${{ github.head_ref }}
          title: "🔒 Security Fixes - Semio Analysis"
          body: |
            ## Security Fixes Applied

            This PR contains automated security fixes generated by Semio:

            - **Vulnerabilities Found**: ${{ steps.check-vulns.outputs.vuln_count }}
            - **High Confidence Fixes**: $(jq -r '.high_confidence_fixes' semio-analysis.json)
            - **Analysis Date**: $(date)

            ### Review Required

            Please review these automated fixes before merging. Some fixes may require manual verification.

            ### Files Modified

            $(git diff --name-only HEAD~1)

            ---
            *Generated by Semio Security Bot*
          delete-branch: true
          commit-message: "🔒 Apply security fixes from Semio analysis"

      - name: Comment on PR
        if: steps.check-vulns.outputs.has_vulnerabilities == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const analysis = JSON.parse(fs.readFileSync('semio-analysis.json', 'utf8'));
            
            const comment = `## 🔒 Semio Security Analysis Complete

            **Vulnerabilities Found**: ${analysis.total_vulnerabilities}
            **High Confidence Fixes**: ${analysis.high_confidence_fixes}
            **Medium Confidence Fixes**: ${analysis.medium_confidence_fixes}
            **Low Confidence Fixes**: ${analysis.low_confidence_fixes}

            ${analysis.total_vulnerabilities > 0 ? 
              '✅ **Security fixes PR created!** Please review the automated fixes before merging.' : 
              '✅ **No vulnerabilities found!** Your code is secure.'}

            ---
            *Analysis by Semio Security Bot*`;
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });

      - name: Comment on PR (no vulnerabilities)
        if: steps.check-vulns.outputs.has_vulnerabilities == 'false'
        uses: actions/github-script@v7
        with:
          script: |
            const comment = `## 🔒 Semio Security Analysis Complete

            ✅ **No vulnerabilities found!** Your code is secure.

            ---
            *Analysis by Semio Security Bot*`;
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });

# 🚀 Semio DevSecOps Pipeline
# GitLab CI/CD pipeline for automated security scanning and AI-powered fix suggestions

stages:
  - scan
  - analyze
  - report
  - security-gate
  - deploy

variables:
  SEMIO_API_URL: "http://semio-production.eba-di323hkd.ap-southeast-1.elasticbeanstalk.com"
  SEMIO_API_KEY: "0af351ad031c16c2e6e67bafe39c8dfa73d44e812d5f8213b0b6fff163d2fd83"  # Use your actual API key
  SEMGREP_CONFIG: "semgrep-rules/security.yml"
  SECURITY_GATE_ENABLED: "true"
  # Severity mapping: ERROR = High (Critical+High), WARNING = Medium, INFO = Low
  CRITICAL_VULNERABILITIES_THRESHOLD: 0    # Critical vulnerabilities (block deployment)
  HIGH_VULNERABILITIES_THRESHOLD: 0        # High vulnerabilities (block deployment)
  MEDIUM_VULNERABILITIES_THRESHOLD: 3      # Medium vulnerabilities (warn but allow)
  LOW_VULNERABILITIES_THRESHOLD: 10        # Low vulnerabilities (informational only)

cache:
  paths:
    - .cache/semgrep/

semgrep-scan:
  stage: scan
  image: returntocorp/semgrep:latest
  before_script:
    - mkdir -p .cache/semgrep reports
  script:
    - |
      echo "🔍 Starting Semgrep security scan..."
      
      # Create a simple test file to scan
      echo "Creating test file for scanning..."
      mkdir -p test-files
      cat > test-files/test.py << 'EOF'
      # Test file with intentional vulnerabilities
      import os
      import subprocess
      import sqlite3
      import random
      
      def vulnerable_function(user_input):
          # SQL Injection vulnerability
          query = f"SELECT * FROM users WHERE id = {user_input}"
          os.system(f"echo {user_input}")  # Command injection
          subprocess.call(f"ls {user_input}", shell=True)  # Command injection
          subprocess.Popen(f"cat {user_input}", shell=True)  # Command injection
          return query
      
      def sql_injection_example(user_id):
          conn = sqlite3.connect("database.db")
          cursor = conn.cursor()
          # SQL Injection
          cursor.execute(f"SELECT * FROM users WHERE id = {user_id}")
          return cursor.fetchall()
      
      # Hardcoded secrets
      API_KEY = "secret123"
      PASSWORD = "admin123"
      DATABASE_PASSWORD = "db_secret_456"
      
      # Debug statements
      print("Debug: This is a debug statement")
      print(f"Debug: API_KEY = {API_KEY}")
      
      # Insecure random
      token = random.randint(1, 1000)
      session_id = random.getrandbits(32)
      
      # XSS vulnerability
      user_data = "<script>alert('xss')</script>"
      html = f"<div>{user_data}</div>"
      
      # Path traversal
      file_path = f"/var/www/uploads/{user_input}"
      with open(file_path, 'r') as f:
          content = f.read()
      EOF
      
      # Run Semgrep with security rules
      echo "Running Semgrep scan on test files..."
      semgrep scan --json --config p/security-audit --output reports/semgrep-results.json test-files/ || {
        echo "⚠️ Security audit failed, trying basic scan..."
        semgrep scan --json --output reports/semgrep-results.json test-files/ || {
          echo "⚠️ Semgrep scan failed, creating empty results..."
          echo '{"version":"1.0","results":[],"errors":[],"paths":{"scanned":[],"skipped":[]}}' > reports/semgrep-results.json
        }
      }
      
      # Generate SARIF report
      semgrep scan --sarif --config p/security-audit --output reports/semgrep-results.sarif test-files/ || {
        echo "⚠️ SARIF generation failed, creating empty SARIF..."
        echo '{"version":"2.1.0","$schema":"https://json.schemastore.org/sarif-2.1.0-rtm.5.json","runs":[]}' > reports/semgrep-results.sarif
      }
      
      # Count vulnerabilities by severity
      echo "📊 Semgrep Scan Results Summary:"
      ERROR_COUNT=$(jq '.results | map(select(.extra.severity == "ERROR")) | length' reports/semgrep-results.json 2>/dev/null || echo "0")
      WARNING_COUNT=$(jq '.results | map(select(.extra.severity == "WARNING")) | length' reports/semgrep-results.json 2>/dev/null || echo "0")
      INFO_COUNT=$(jq '.results | map(select(.extra.severity == "INFO")) | length' reports/semgrep-results.json 2>/dev/null || echo "0")
      TOTAL_FINDINGS=$(jq '.results | length' reports/semgrep-results.json 2>/dev/null || echo "0")
      
      echo "  🔴 ERROR: $ERROR_COUNT"
      echo "  🟡 WARNING: $WARNING_COUNT"
      echo "  🔵 INFO: $INFO_COUNT"
      echo "  📈 Total Findings: $TOTAL_FINDINGS"
      
      echo "✅ Semgrep scan completed"
  artifacts:
    paths:
      - reports/
    reports:
      sast: reports/semgrep-results.sarif
    expire_in: 1 week
    when: always
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
  allow_failure: false

semio-analysis:
  stage: analyze
  image: python:3.11-slim
  before_script:
    - apt-get update && apt-get install -y curl jq
    - pip install requests python-dotenv
    - mkdir -p reports
  script:
    - |
      echo "🤖 Starting Semio AI analysis..."
      if [ ! -f reports/semgrep-results.json ]; then
        echo "❌ No Semgrep results found. Skipping Semio analysis."
        exit 0
      fi
      
      # Test Semio API connectivity first
      echo "🔍 Testing Semio API connectivity..."
      HEALTH_CHECK=$(curl -s -o /dev/null -w "%{http_code}" "$SEMIO_API_URL/health" || echo "000")
      if [ "$HEALTH_CHECK" != "200" ]; then
        echo "❌ Semio API not accessible. Status: $HEALTH_CHECK"
        echo "⚠️ Skipping Semio analysis due to API unavailability"
        exit 0
      fi
      
      echo "✅ Semio API is accessible. Proceeding with analysis..."
      
      # Use the CLI endpoint with API key authentication
      SEMIO_RESPONSE=$(curl -s -X POST "$SEMIO_API_URL/api/review-cli?api_key=$SEMIO_API_KEY&format=json" \
        -H "Content-Type: application/json" \
        -H "X-Semio-Source: gitlab-pipeline" \
        -d @reports/semgrep-results.json)
      
      # Check if the request was successful
      if echo "$SEMIO_RESPONSE" | jq -e . >/dev/null 2>&1; then
        echo "$SEMIO_RESPONSE" > reports/semio-analysis.json
        echo "✅ Semio analysis completed successfully"
        
        # Extract and display summary
        TOTAL_VULNS=$(echo "$SEMIO_RESPONSE" | jq '.total_vulnerabilities // 0')
        ERROR_COUNT=$(echo "$SEMIO_RESPONSE" | jq '.error_severity_count // 0')
        WARNING_COUNT=$(echo "$SEMIO_RESPONSE" | jq '.warning_severity_count // 0')
        INFO_COUNT=$(echo "$SEMIO_RESPONSE" | jq '.info_severity_count // 0')
        FIXES_COUNT=$(echo "$SEMIO_RESPONSE" | jq '.fixes | length // 0')
        
        echo "📊 Semio Analysis Summary:"
        echo "  🔴 ERROR: $ERROR_COUNT"
        echo "  🟡 WARNING: $WARNING_COUNT"
        echo "  🔵 INFO: $INFO_COUNT"
        echo "  📈 Total Vulnerabilities: $TOTAL_VULNS"
        echo "  🔧 Generated Fixes: $FIXES_COUNT"
      else
        echo "❌ Semio analysis failed. Response: $SEMIO_RESPONSE"
        echo "⚠️ Creating empty analysis file"
        echo '{"total_vulnerabilities": 0, "error_severity_count": 0, "warning_severity_count": 0, "info_severity_count": 0, "fixes": []}' > reports/semio-analysis.json
      fi
  artifacts:
    paths:
      - reports/semio-analysis.json
    expire_in: 1 week
    when: always
  dependencies:
    - semgrep-scan
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
  allow_failure: true  # Allow failure so pipeline continues

generate-reports:
  stage: report
  image: python:3.11-slim
  before_script:
    - pip install jinja2 markdown requests
    - mkdir -p reports
  script:
    - |
      echo "📋 Generating security reports..."
      
      # Create a simple report generator
      cat > generate_report.py << 'EOF'
      import json
      import sys
      from datetime import datetime
      
      def generate_security_report(semgrep_file, semio_file, output_file):
          try:
              with open(semgrep_file, 'r') as f:
                  semgrep_data = json.load(f)
              
              with open(semio_file, 'r') as f:
                  semio_data = json.load(f)
              
              # Generate markdown report
              report = f"""# Security Analysis Report
      
      **Generated:** {datetime.now().strftime('%Y-%m-%d %H:%M:%S')}
      
      ## Semgrep Scan Results
      
      - **Total Findings:** {len(semgrep_data.get('results', []))}
      - **ERROR Severity:** {len([r for r in semgrep_data.get('results', []) if r.get('extra', {}).get('severity') == 'ERROR'])}
      - **WARNING Severity:** {len([r for r in semgrep_data.get('results', []) if r.get('extra', {}).get('severity') == 'WARNING'])}
      - **INFO Severity:** {len([r for r in semgrep_data.get('results', []) if r.get('extra', {}).get('severity') == 'INFO'])}
      
      ## Semio AI Analysis
      
      - **Total Vulnerabilities:** {semio_data.get('total_vulnerabilities', 0)}
      - **Generated Fixes:** {len(semio_data.get('fixes', []))}
      - **ERROR Severity:** {semio_data.get('error_severity_count', 0)}
      - **WARNING Severity:** {semio_data.get('warning_severity_count', 0)}
      - **INFO Severity:** {semio_data.get('info_severity_count', 0)}
      
      ## Detailed Findings
      
      """
              
              # Add Semgrep findings
              for i, finding in enumerate(semgrep_data.get('results', [])[:10], 1):
                  report += f"""
      ### Finding {i}
      - **Rule:** {finding.get('rule_id', 'Unknown')}
      - **File:** {finding.get('path', 'Unknown')}
      - **Line:** {finding.get('start', {}).get('line', 'Unknown')}
      - **Severity:** {finding.get('extra', {}).get('severity', 'Unknown')}
      - **Message:** {finding.get('extra', {}).get('message', 'No message')}
      """
              
              # Add Semio fixes
              if semio_data.get('fixes'):
                  report += "\n## AI-Generated Fixes\n"
                  for i, fix in enumerate(semio_data.get('fixes', [])[:5], 1):
                      report += f"""
      ### Fix {i}
      - **Rule:** {fix.get('rule_id', 'Unknown')}
      - **File:** {fix.get('file_path', 'Unknown')}
      - **Line:** {fix.get('line_number', 'Unknown')}
      - **Confidence:** {fix.get('confidence_score', 'Unknown')}
      - **Fix Type:** {fix.get('fix_type', 'Unknown')}
      - **Impact:** {fix.get('impact', 'Unknown')}
      - **Suggested Fix:** `{fix.get('suggested_fix', 'No fix provided')}`
      """
              
              with open(output_file, 'w') as f:
                  f.write(report)
              
              print(f"✅ Report generated: {output_file}")
              
          except Exception as e:
              print(f"❌ Error generating report: {e}")
              # Create minimal report
              with open(output_file, 'w') as f:
                  f.write(f"# Security Report\n\nGenerated: {datetime.now()}\n\nError: {e}")
      
      if __name__ == "__main__":
          generate_security_report(sys.argv[1], sys.argv[2], sys.argv[3])
      EOF
      
      # Generate reports
      python generate_report.py reports/semgrep-results.json reports/semio-analysis.json reports/security-report.md
      echo "✅ Reports generated successfully"
  artifacts:
    paths:
      - reports/security-report.md
    expire_in: 1 month
    when: always
  dependencies:
    - semgrep-scan
    - semio-analysis
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

security-gate:
  stage: security-gate
  image: python:3.11-slim
  before_script:
    - pip install requests
  script:
    - |
      echo "🔒 Security Gate Validation..."
      if [ "$SECURITY_GATE_ENABLED" != "true" ]; then
        echo "⚠️ Security gate disabled. Proceeding..."
        exit 0
      fi
      
      # Check if we have Semio analysis results
      if [ ! -f reports/semio-analysis.json ]; then
        echo "⚠️ No Semio analysis results found. Using Semgrep results only..."
        # Extract counts from Semgrep results
        ERROR_COUNT=$(jq '.results | map(select(.extra.severity == "ERROR")) | length' reports/semgrep-results.json 2>/dev/null || echo "0")
        WARNING_COUNT=$(jq '.results | map(select(.extra.severity == "WARNING")) | length' reports/semgrep-results.json 2>/dev/null || echo "0")
        INFO_COUNT=$(jq '.results | map(select(.extra.severity == "INFO")) | length' reports/semgrep-results.json 2>/dev/null || echo "0")
      else
        # Extract counts from Semio analysis
        ERROR_COUNT=$(jq '.error_severity_count // 0' reports/semio-analysis.json 2>/dev/null || echo "0")
        WARNING_COUNT=$(jq '.warning_severity_count // 0' reports/semio-analysis.json 2>/dev/null || echo "0")
        INFO_COUNT=$(jq '.info_severity_count // 0' reports/semio-analysis.json 2>/dev/null || echo "0")
      fi
      
      # Convert to integers
      ERROR_COUNT=${ERROR_COUNT:-0}
      WARNING_COUNT=${WARNING_COUNT:-0}
      INFO_COUNT=${INFO_COUNT:-0}
      
      # Calculate total vulnerabilities
      TOTAL_VULNERABILITIES=$((ERROR_COUNT + WARNING_COUNT + INFO_COUNT))
      
      # Display complete breakdown
      echo "🔍 Security Gate Breakdown:"
      echo "  🔴 ERROR (Critical+High): $ERROR_COUNT (Threshold: $CRITICAL_VULNERABILITIES_THRESHOLD)"
      echo "  🟡 WARNING (Medium): $WARNING_COUNT (Threshold: $MEDIUM_VULNERABILITIES_THRESHOLD)"
      echo "  🔵 INFO (Low): $INFO_COUNT (Threshold: $LOW_VULNERABILITIES_THRESHOLD)"
      echo "📊 Total Vulnerabilities: $TOTAL_VULNERABILITIES"
      
      # Check if deployment should be blocked
      if [ "$ERROR_COUNT" -gt "$CRITICAL_VULNERABILITIES_THRESHOLD" ]; then
        echo "❌ ERROR: Found $ERROR_COUNT ERROR severity vulnerabilities"
        echo "🚫 Deployment blocked - Security threshold exceeded"
        exit 1
      fi
      
      # Check for medium severity warnings (informational only)
      if [ "$WARNING_COUNT" -gt "$MEDIUM_VULNERABILITIES_THRESHOLD" ]; then
        echo "⚠️ WARNING: Found $WARNING_COUNT WARNING severity vulnerabilities (Medium)"
        echo "⚠️ Consider addressing medium severity issues before deployment"
      fi
      
      echo "✅ Security gate passed - All thresholds met"
  dependencies:
    - semgrep-scan
    - semio-analysis
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
  allow_failure: false

deploy-staging:
  stage: deploy
  image: alpine:latest
  script:
    - echo "🚀 Deploying to staging environment..."
    - echo "✅ Staging deployment completed"
  environment:
    name: staging
    url: https://staging.example.com
  dependencies:
    - security-gate
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
  when: manual

# GitLab CI/CD Configuration for Semio Integration
# Copy this to your project's .gitlab-ci.yml file

stages:
  - scan
  - analyze
  - apply-fixes
  - report

variables:
  SEMIO_API_URL: "http://semio-production.eba-di323hkd.ap-southeast-1.elasticbeanstalk.com"
  # SEMIO_API_KEY should be set in GitLab CI/CD Variables (Settings > CI/CD > Variables)

# Semgrep Security Scan
semgrep-scan:
  stage: scan
  image: returntocorp/semgrep:latest
  script:
    - echo "🔍 Running Semgrep security scan..."
    - semgrep ci --json --output semgrep-results.json --config auto
  artifacts:
    paths: [semgrep-results.json]
    reports:
      semgrep: semgrep-results.json
    expire_in: 1 week
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

# Semio Basic Analysis
semio-analysis:
  stage: analyze
  image: python:3.9-slim
  before_script:
    - pip install requests
  script:
    - echo "🔒 Running Semio security analysis..."
    - |
      curl -X POST "$SEMIO_API_URL/api/review-cli" \
        -H "Content-Type: application/json" \
        -d @semgrep-results.json \
        --data-urlencode "api_key=$SEMIO_API_KEY" \
        --data-urlencode "format=json" \
        -o semio-report.json
    - echo "📊 Analysis completed. Found vulnerabilities: $(jq '.total_vulnerabilities' semio-report.json)"
  artifacts:
    paths: [semio-report.json]
    expire_in: 1 week
  dependencies:
    - semgrep-scan
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

# Semio Agentic Analysis (Enhanced)
semio-agentic-analysis:
  stage: analyze
  image: python:3.9-slim
  before_script:
    - pip install requests
  script:
    - echo "🤖 Running Semio agentic analysis..."
    - |
      curl -X POST "$SEMIO_API_URL/api/review-agentic-cli" \
        -H "Content-Type: application/json" \
        -d @semgrep-results.json \
        --data-urlencode "api_key=$SEMIO_API_KEY" \
        --data-urlencode "format=json" \
        -o semio-agentic-report.json
    - echo "📊 Agentic analysis completed. Enhanced fixes: $(jq '.fixes | length' semio-agentic-report.json)"
  artifacts:
    paths: [semio-agentic-report.json]
    expire_in: 1 week
  dependencies:
    - semgrep-scan
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

# Generate Markdown Report
semio-markdown-report:
  stage: report
  image: python:3.9-slim
  before_script:
    - pip install requests
  script:
    - echo "📝 Generating Markdown report..."
    - |
      curl -X POST "$SEMIO_API_URL/api/review-cli" \
        -H "Content-Type: application/json" \
        -d @semgrep-results.json \
        --data-urlencode "api_key=$SEMIO_API_KEY" \
        --data-urlencode "format=markdown" \
        -o semio-report.md
    - echo "📄 Markdown report generated"
  artifacts:
    paths: [semio-report.md]
    expire_in: 1 week
  dependencies:
    - semgrep-scan
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

# Generate HTML Report
semio-html-report:
  stage: report
  image: python:3.9-slim
  before_script:
    - pip install requests
  script:
    - echo "🌐 Generating HTML report..."
    - |
      curl -X POST "$SEMIO_API_URL/api/review-cli" \
        -H "Content-Type: application/json" \
        -d @semgrep-results.json \
        --data-urlencode "api_key=$SEMIO_API_KEY" \
        --data-urlencode "format=html" \
        -o semio-report.html
    - echo "🌐 HTML report generated"
  artifacts:
    paths: [semio-report.html]
    expire_in: 1 week
  dependencies:
    - semgrep-scan
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

# Security Summary (Optional)
security-summary:
  stage: report
  image: python:3.9-slim
  before_script:
    - pip install requests
  script:
    - echo "📋 Generating security summary..."
    - |
      if [ -f "semio-report.json" ]; then
        echo "## 🔒 Security Analysis Summary" >> security-summary.md
        echo "" >> security-summary.md
        echo "**Total Vulnerabilities:** $(jq '.total_vulnerabilities' semio-report.json)" >> security-summary.md
        echo "**High Confidence Fixes:** $(jq '.high_confidence_fixes' semio-report.json)" >> security-summary.md
        echo "**Medium Confidence Fixes:** $(jq '.medium_confidence_fixes' semio-report.json)" >> security-summary.md
        echo "**Low Confidence Fixes:** $(jq '.low_confidence_fixes' semio-report.json)" >> security-summary.md
        echo "" >> security-summary.md
        echo "**Severity Distribution:**" >> security-summary.md
        jq -r '.summary.severity_distribution | to_entries[] | "- " + .key + ": " + (.value | tostring)' semio-report.json >> security-summary.md
        echo "" >> security-summary.md
        echo "**Fix Types:**" >> security-summary.md
        jq -r '.summary.fix_types | to_entries[] | "- " + .key + ": " + (.value | tostring)' semio-report.json >> security-summary.md
      else
        echo "❌ No Semio report found"
        exit 1
      fi
  artifacts:
    paths: [security-summary.md]
    expire_in: 1 week
  dependencies:
    - semio-analysis
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

# Automated Fix Application (Optional - for high confidence fixes)
apply-fixes:
  stage: apply-fixes
  image: python:3.9-slim
  before_script:
    - pip install requests
  script:
    - echo "🔧 Applying high confidence fixes..."
    - |
      if [ -f "semio-agentic-report.json" ]; then
        # Extract high confidence fixes
        jq '.fixes[] | select(.confidence_score >= 0.8)' semio-agentic-report.json > high-confidence-fixes.json
        
        # Count high confidence fixes
        HIGH_CONFIDENCE_COUNT=$(jq '.fixes[] | select(.confidence_score >= 0.8) | length' semio-agentic-report.json)
        
        if [ "$HIGH_CONFIDENCE_COUNT" -gt 0 ]; then
          echo "Found $HIGH_CONFIDENCE_COUNT high confidence fixes"
          echo "Apply these fixes manually or implement automated application logic"
        else
          echo "No high confidence fixes found"
        fi
      else
        echo "❌ No agentic report found"
        exit 1
      fi
  artifacts:
    paths: [high-confidence-fixes.json]
    expire_in: 1 week
  dependencies:
    - semio-agentic-analysis
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
  allow_failure: true

# Manual Review Required (for medium/low confidence fixes)
manual-review:
  stage: apply-fixes
  image: python:3.9-slim
  before_script:
    - pip install requests
  script:
    - echo "👀 Manual review required for medium/low confidence fixes..."
    - |
      if [ -f "semio-agentic-report.json" ]; then
        # Extract medium/low confidence fixes
        jq '.fixes[] | select(.confidence_score < 0.8)' semio-agentic-report.json > manual-review-fixes.json
        
        # Count fixes requiring review
        REVIEW_COUNT=$(jq '.fixes[] | select(.confidence_score < 0.8) | length' semio-agentic-report.json)
        
        if [ "$REVIEW_COUNT" -gt 0 ]; then
          echo "⚠️  $REVIEW_COUNT fixes require manual review"
          echo "Please review the fixes in manual-review-fixes.json"
        else
          echo "✅ No fixes require manual review"
        fi
      fi
  artifacts:
    paths: [manual-review-fixes.json]
    expire_in: 1 week
  dependencies:
    - semio-agentic-analysis
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
  allow_failure: true
